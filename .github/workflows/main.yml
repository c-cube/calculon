name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run:
    name: build  # build+test on various versions of OCaml, on linux
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        container:
          - ghcr.io/c-cube/c-cube-commmon/ci-5.1:latest
          - ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest

    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6

      # TODO: remove once it's released
      - run: opam pin https://github.com/c-cube/irky.git#main -y -n
      - run: opam pin -n .
      - run: apt update && opam depext -yt calculon calculon-web
      - run: opam install -t . --deps-only && opam install re iter
      - run: opam exec -- dune build @install
      - run: opam exec -- dune runtest
