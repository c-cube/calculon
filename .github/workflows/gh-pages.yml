name: github pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy doc
    runs-on: ubuntu-latest
    container: ghcr.io/c-cube/c-cube-commmon/ci-doc-5.4:latest
    steps:
      - uses: actions/checkout@v6
      - run: opam pin https://github.com/c-cube/irky.git#main -y -n
      - run: opam install calculon calculon-web -t
      - run: opam exec -- odig odoc --cache-dir=_doc/ calculon calculon-web

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_doc/html
          destination_dir: .
          enable_jekyll: false
